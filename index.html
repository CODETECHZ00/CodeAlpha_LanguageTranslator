<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Translator - CodeAlpha</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            color: #e94560;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            color: rgba(255,255,255,0.5);
            font-size: 0.95rem;
        }

        .lang-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }

        .lang-select-wrap {
            flex: 1;
        }

        .lang-select-wrap label {
            display: block;
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: white;
            font-size: 0.95rem;
            cursor: pointer;
            outline: none;
            transition: border-color 0.3s;
        }

        select:focus { border-color: #e94560; }
        select option { background: #1a1a2e; color: white; }

        .swap-btn {
            margin-top: 20px;
            background: rgba(233, 69, 96, 0.2);
            border: 1px solid #e94560;
            color: #e94560;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .swap-btn:hover {
            background: #e94560;
            color: white;
            transform: rotate(180deg);
        }

        .text-area-wrap {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .text-box {
            position: relative;
        }

        .text-box label {
            display: block;
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        textarea:focus { border-color: #e94560; }
        textarea::placeholder { color: rgba(255,255,255,0.3); }
        textarea:read-only { cursor: default; }

        .char-count {
            position: absolute;
            bottom: 10px;
            right: 12px;
            color: rgba(255,255,255,0.3);
            font-size: 0.75rem;
        }

        .detected-lang {
            font-size: 0.8rem;
            color: #e94560;
            margin-top: 5px;
            min-height: 18px;
        }

        .btn-row {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .translate-btn {
            background: linear-gradient(135deg, #e94560, #c62a47);
            color: white;
            border: none;
            padding: 14px 45px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }

        .translate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(233, 69, 96, 0.4);
        }

        .translate-btn:active { transform: translateY(0); }

        .copy-btn {
            background: rgba(255,255,255,0.08);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 14px 25px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .copy-btn:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.4);
        }

        .clear-btn {
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px 25px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .clear-btn:hover { background: rgba(255,255,255,0.12); }

        .loading {
            display: none;
            text-align: center;
            color: rgba(255,255,255,0.5);
            margin-top: 15px;
            font-size: 0.9rem;
        }

        .error-msg {
            display: none;
            background: rgba(233, 69, 96, 0.15);
            border: 1px solid rgba(233, 69, 96, 0.4);
            color: #e94560;
            padding: 10px 15px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
            font-size: 0.9rem;
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            color: rgba(255,255,255,0.25);
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .text-area-wrap { grid-template-columns: 1fr; }
            .lang-row { flex-direction: column; }
            .swap-btn { transform: rotate(90deg); margin: 0 auto; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🌐 Language Translator</h1>
        <p>Translate text between 100+ languages instantly</p>
    </div>

    <!-- Language Selection Row -->
    <div class="lang-row">
        <div class="lang-select-wrap">
            <label>Source Language</label>
            <select id="sourceLang">
                <option value="auto">🔍 Auto Detect</option>
                {% for code, name in languages %}
                <option value="{{ code }}">{{ name.title() }}</option>
                {% endfor %}
            </select>
        </div>

        <button class="swap-btn" onclick="swapLanguages()" title="Swap Languages">⇄</button>

        <div class="lang-select-wrap">
            <label>Target Language</label>
            <select id="targetLang">
                {% for code, name in languages %}
                <option value="{{ code }}" {% if code == 'hi' %}selected{% endif %}>{{ name.title() }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <!-- Text Areas -->
    <div class="text-area-wrap">
        <div class="text-box">
            <label>Input Text</label>
            <textarea id="inputText" placeholder="Enter text to translate..." maxlength="5000"
                      oninput="updateCharCount()"></textarea>
            <span class="char-count" id="charCount">0 / 5000</span>
            <div class="detected-lang" id="detectedLang"></div>
        </div>

        <div class="text-box">
            <label>Translated Text</label>
            <textarea id="outputText" placeholder="Translation will appear here..." readonly></textarea>
        </div>
    </div>

    <!-- Buttons -->
    <div class="btn-row">
        <button class="translate-btn" onclick="translateText()">Translate →</button>
        <button class="copy-btn" onclick="copyText()">📋 Copy</button>
        <button class="clear-btn" onclick="clearAll()">✕ Clear</button>
    </div>

    <div class="loading" id="loading">⏳ Translating...</div>
    <div class="error-msg" id="errorMsg"></div>

    <div class="footer">CodeAlpha AI Internship | Language Translation Tool</div>
</div>

<script>
    function updateCharCount() {
        const text = document.getElementById('inputText').value;
        document.getElementById('charCount').textContent = `${text.length} / 5000`;
    }

    async function translateText() {
        const text = document.getElementById('inputText').value.trim();
        const sourceLang = document.getElementById('sourceLang').value;
        const targetLang = document.getElementById('targetLang').value;

        if (!text) {
            showError('Please enter some text to translate!');
            return;
        }

        // Show loading state
        document.getElementById('loading').style.display = 'block';
        document.getElementById('errorMsg').style.display = 'none';
        document.getElementById('outputText').value = '';
        document.getElementById('detectedLang').textContent = '';

        try {
            const response = await fetch('/translate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text, source_lang: sourceLang, target_lang: targetLang })
            });

            const data = await response.json();

            if (data.success) {
                document.getElementById('outputText').value = data.translated_text;
                if (sourceLang === 'auto') {
                    document.getElementById('detectedLang').textContent =
                        `Detected: ${data.detected_language}`;
                }
            } else {
                showError(data.error || 'Translation failed. Please try again.');
            }
        } catch (err) {
            showError('Connection error. Please check your internet connection.');
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    function swapLanguages() {
        const sourceSel = document.getElementById('sourceLang');
        const targetSel = document.getElementById('targetLang');
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');

        if (sourceSel.value === 'auto') return;

        // Swap language selections
        const temp = sourceSel.value;
        sourceSel.value = targetSel.value;
        targetSel.value = temp;

        // Swap text content
        const tempText = inputText.value;
        inputText.value = outputText.value;
        outputText.value = tempText;
        updateCharCount();
    }

    function copyText() {
        const output = document.getElementById('outputText').value;
        if (!output) { showError('Nothing to copy yet!'); return; }
        navigator.clipboard.writeText(output).then(() => {
            const btn = document.querySelector('.copy-btn');
            btn.textContent = '✅ Copied!';
            setTimeout(() => btn.textContent = '📋 Copy', 2000);
        });
    }

    function clearAll() {
        document.getElementById('inputText').value = '';
        document.getElementById('outputText').value = '';
        document.getElementById('detectedLang').textContent = '';
        document.getElementById('errorMsg').style.display = 'none';
        updateCharCount();
    }

    function showError(msg) {
        const errDiv = document.getElementById('errorMsg');
        errDiv.textContent = msg;
        errDiv.style.display = 'block';
        setTimeout(() => errDiv.style.display = 'none', 4000);
    }

    // Allow Ctrl+Enter to translate
    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.key === 'Enter') translateText();
    });
</script>
</body>
</html>
